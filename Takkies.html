<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MP3 Player</title>
  <style>
h2 {text-align: center;}
div {text-align: center;}
        body {
        background: #121212;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: white;
    }

    .audio-container {
        background: #1e1e1e;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        width: 300px;
        text-align: center;
    }

    .audio-title {
        margin-bottom: 10px;
        font-size: 18px;
        font-weight: bold;
    }

    audio {
        width: 100%;
        outline: none;
        border-radius: 10px;
    }

    /* Chrome / Edge styling */
    audio::-webkit-media-controls-panel {
        background-color: #2c2c2c;
        border-radius: 10px;
    }

    audio::-webkit-media-controls-play-button,
    audio::-webkit-media-controls-mute-button {
        filter: invert(1);
    }

    audio::-webkit-media-controls-current-time-display,
    audio::-webkit-media-controls-time-remaining-display {
        color: white;
    }

    /* Firefox fallback (beperkt te stylen) */
    audio {
        background-color: #2c2c2c;
    }
</style>
</head>
<body>
<div class="audio-container">
    <div class="audio-title">🎵 Takkies 2026</div>
    
    <audio controls>
        <source src="Audio van Roderik.mp3" type="audio/mpeg">
        Je browser ondersteunt geen audio element.
    </audio>
</div>
</body>
